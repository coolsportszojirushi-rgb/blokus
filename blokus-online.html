<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロックス・オンライン</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        #lobby-screen, #game-screen {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        #game-screen {
            max-width: 800px;
            display: none;
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px 5px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .room-code-display {
            font-size: 24px;
            letter-spacing: 2px;
            color: #e74c3c;
            margin: 20px 0;
            font-weight: bold;
        }
        .status-message {
            margin-top: 15px;
            color: #7f8c8d;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(20, 20px);
            grid-template-rows: repeat(20, 20px);
            gap: 1px;
            background-color: #bdc3c7;
            border: 2px solid #7f8c8d;
            margin: 20px auto;
            width: max-content;
        }
        .cell {
            width: 20px;
            height: 20px;
            background-color: white;
            cursor: pointer;
        }
        .cell:hover {
            background-color: #ecf0f1;
        }
        .player-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>ブロックス・オンライン</h1>

    <div id="lobby-screen">
        <h2>ゲームに参加する</h2>
        <input type="text" id="player-name" placeholder="あなたの名前を入力してください">
        <br>
        <button id="btn-create-room">部屋を作る</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <input type="text" id="room-code-input" placeholder="4桁のルームコードを入力" maxlength="4">
        <br>
        <button id="btn-join-room" style="background-color: #2ecc71;">参加する</button>
        <div id="lobby-status" class="status-message"></div>
    </div>

    <div id="game-screen">
        <div class="player-info" id="player-list">
            </div>
        <div id="current-room-display" class="room-code-display"></div>
        <div id="board"></div>
        <div id="game-status" class="status-message">他のプレイヤーを待っています...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // お客様のFirebase設定情報
        const firebaseConfig = {
            apiKey: "AIzaSyBR-FbFj4n2RluU4JUqH_jbwxLtGWIRESA",
            authDomain: "blokus-game-6784c.firebaseapp.com",
            databaseURL: "https://blokus-game-6784c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "blokus-game-6784c",
            storageBucket: "blokus-game-6784c.firebasestorage.app",
            messagingSenderId: "984140782107",
            appId: "1:984140782107:web:1ac21c601d3960aca336be",
            measurementId: "G-DZFLV3WCYZ"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 画面要素の取得
        const lobbyScreen = document.getElementById('lobby-screen');
        const gameScreen = document.getElementById('game-screen');
        const playerNameInput = document.getElementById('player-name');
        const roomCodeInput = document.getElementById('room-code-input');
        const lobbyStatus = document.getElementById('lobby-status');
        const boardElement = document.getElementById('board');
        const currentRoomDisplay = document.getElementById('current-room-display');

        let myPlayerId = null;
        let currentRoomId = null;

        // ランダムな4桁のルームコードを生成する関数
        function generateRoomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // 部屋を作るボタンの処理
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            const name = playerNameInput.value.trim();
            if (!name) {
                lobbyStatus.textContent = "名前を入力してください。";
                return;
            }

            lobbyStatus.textContent = "部屋を作成中...";
            const roomId = generateRoomCode();
            const roomRef = ref(db, 'rooms/' + roomId);

            // 初期データのセット
            await set(roomRef, {
                status: 'waiting',
                players: {
                    player1: { name: name, color: 'red' }
                }
            });

            myPlayerId = 'player1';
            currentRoomId = roomId;
            enterGameScreen(roomId);
        });

        // 参加するボタンの処理
        document.getElementById('btn-join-room').addEventListener('click', async () => {
            const name = playerNameInput.value.trim();
            const roomId = roomCodeInput.value.trim();

            if (!name || !roomId) {
                lobbyStatus.textContent = "名前とルームコードの両方を入力してください。";
                return;
            }

            lobbyStatus.textContent = "部屋を探しています...";
            const roomRef = ref(db, 'rooms/' + roomId);
            const snapshot = await get(roomRef);

            if (snapshot.exists()) {
                const roomData = snapshot.val();
                const playersCount = Object.keys(roomData.players || {}).length;

                if (playersCount >= 4) {
                    lobbyStatus.textContent = "この部屋はすでに満員です。";
                    return;
                }

                myPlayerId = 'player' + (playersCount + 1);
                const colors = ['red', 'blue', 'green', 'orange'];
                
                // プレイヤーの追加
                await update(ref(db, `rooms/${roomId}/players`), {
                    [myPlayerId]: { name: name, color: colors[playersCount] }
                });

                currentRoomId = roomId;
                enterGameScreen(roomId);
            } else {
                lobbyStatus.textContent = "指定されたルームコードが見つかりません。";
            }
        });

        // ゲーム画面への切り替えと盤面描画
        function enterGameScreen(roomId) {
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            currentRoomDisplay.textContent = "ルームコード: " + roomId;
            createBoard();
            listenToRoomUpdates(roomId);
        }

        // 20x20の盤面をHTMLに生成
        function createBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 400; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                boardElement.appendChild(cell);
            }
        }

        // データベースの変更をリアルタイムで監視
        function listenToRoomUpdates(roomId) {
            const roomRef = ref(db, 'rooms/' + roomId);
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updatePlayerList(data.players);
                    if (Object.keys(data.players).length >= 2) {
                        document.getElementById('game-status').textContent = "対戦相手が揃いました！ゲームを開始できます。（現在UI表示のテスト中です）";
                    }
                }
            });
        }

        // 参加しているプレイヤー一覧の表示更新
        function updatePlayerList(players) {
            const playerListDiv = document.getElementById('player-list');
            playerListDiv.innerHTML = '';
            for (const key in players) {
                const p = players[key];
                playerListDiv.innerHTML += `<div><b>${p.name}</b><br><span style="color:${p.color}">■ ${p.color}</span></div>`;
            }
        }
    </script>
</body>
</html>
